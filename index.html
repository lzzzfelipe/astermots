<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frenchy 🇫🇷</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background: #fef9f0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem 1rem;
      color: #3d2e1e;
    }

    /* --- Title --- */
    .title {
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 600;
      color: #b5382a;
      margin-bottom: 0.2rem;
      letter-spacing: 0.02em;
    }
    .title span { font-size: 110%; }
    .subtitle-text {
      font-size: clamp(0.8rem, 2vw, 1.1rem);
      color: #b8a080;
      margin-bottom: clamp(0.8rem, 2vh, 1.5rem);
      font-weight: 600;
    }

    /* --- Search --- */
    .search-container {
      width: 100%;
      max-width: 520px;
      margin-bottom: clamp(0.8rem, 2vh, 1.5rem);
    }

    #search {
      width: 100%;
      padding: clamp(0.6rem, 1.5vh, 1rem) 1.2rem;
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      font-weight: 500;
      border: 3px solid #e8ddd0;
      border-radius: 16px;
      background: #fff;
      outline: none;
      color: #3d2e1e;
      letter-spacing: 0.01em;
      text-align: center;
      transition: border-color 0.2s;
    }
    #search:focus { border-color: #c47b2b; }
    #search::placeholder { color: #d4c4b0; font-weight: 400; font-size: clamp(0.9rem, 2.5vw, 1.4rem); }

    /* --- Montessori grammar badges --- */
    .cat {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: clamp(0.55rem, 1.2vw, 0.75rem);
      padding: 0.25rem 0.6rem;
      border-radius: 20px;
      display: inline-block;
    }
    .cat-noun { color: #fff; background: #3d2e1e; }
    .cat-verb { color: #fff; background: #cc3d2e; }
    .cat-adjective { color: #fff; background: #3a6ea5; }
    .cat-adverb { color: #fff; background: #d4882b; }
    .cat-determiner { color: #3d2e1e; background: #b8d4e8; }
    .cat-preposition { color: #fff; background: #5a9a6a; }
    .cat-pronoun { color: #fff; background: #8a5a9a; }
    .cat-conjunction { color: #fff; background: #d48a95; }
    .cat-interjection { color: #3d2e1e; background: #e8c84a; }

    /* --- Main result card --- */
    .card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      padding: clamp(1rem, 2vh, 1.5rem) 1.5rem;
      margin-bottom: clamp(0.4rem, 1vh, 0.75rem);
      border-radius: 16px;
      border: 3px solid #e8ddd0;
      animation: popIn 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    .card-word {
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      margin-bottom: 0.3rem;
      color: #3d2e1e;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: clamp(0.3rem, 1vh, 0.6rem);
      flex-wrap: wrap;
    }
    .card-gender {
      color: #b8a080;
      font-size: clamp(0.65rem, 1.3vw, 0.85rem);
      font-weight: 700;
    }
    .phonetic-badge {
      color: #b8a080;
      font-size: clamp(0.65rem, 1.3vw, 0.85rem);
      font-style: italic;
    }
    .card-definition {
      font-size: clamp(0.9rem, 2.2vw, 1.3rem);
      line-height: 1.5;
      color: #5a4a38;
      margin-bottom: 0.4rem;
      font-weight: 600;
    }
    .card-example {
      font-size: clamp(0.75rem, 1.8vw, 1rem);
      color: #b8a080;
      font-style: italic;
      font-weight: 600;
      padding: 0.4rem 0.75rem;
      background: #fef5e8;
      border-radius: 10px;
    }

    /* --- Secondary results --- */
    .bottom-row {
      width: 100%;
      max-width: 520px;
      display: flex;
      gap: 0.5rem;
    }
    .mini-card {
      flex: 1;
      padding: clamp(0.4rem, 1vh, 0.7rem) 0.5rem;
      background: #fff;
      border: 2px solid #e8ddd0;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s, transform 0.15s;
      animation: popIn 0.3s cubic-bezier(0.34, 1.4, 0.64, 1) both;
    }
    .mini-card:nth-child(1) { animation-delay: 0.05s; }
    .mini-card:nth-child(2) { animation-delay: 0.1s; }
    .mini-card:nth-child(3) { animation-delay: 0.15s; }
    .mini-card:nth-child(4) { animation-delay: 0.2s; }
    .mini-card:hover { border-color: #c47b2b; transform: translateY(-2px); }
    .mini-card .word {
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      font-size: clamp(0.85rem, 2vw, 1.3rem);
      color: #3d2e1e;
    }

    /* Diff highlights */
    .diff-same { color: inherit; }
    .diff-change { color: #cc3d2e; }
    .diff-add { color: #3a6ea5; }

    /* --- Hint --- */
    .hint {
      position: fixed;
      bottom: 1.2rem;
      color: #c4b098;
      font-size: 0.75rem;
      text-align: center;
      font-weight: 600;
    }
    .hint code {
      background: #f0e8dc;
      padding: 0.15rem 0.45rem;
      font-size: 0.7rem;
      border-radius: 6px;
      color: #8a7562;
      font-weight: 700;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes swapUp {
      0% { opacity: 0.7; transform: scale(0.6) translateY(60px); }
      50% { opacity: 1; transform: scale(1.06) translateY(-8px); }
      75% { transform: scale(0.98) translateY(3px); }
      100% { transform: scale(1) translateY(0); }
    }

    @keyframes swapDown {
      0% { opacity: 0.7; transform: scale(1.3) translateY(-50px); }
      50% { opacity: 1; transform: scale(0.92) translateY(6px); }
      75% { transform: scale(1.03) translateY(-2px); }
      100% { transform: scale(1) translateY(0); }
    }

    .card.swap-in {
      animation: swapUp 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .mini-card.swap-in {
      animation: swapDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
  </style>
</head>
<body>
  <div class="title"><span>🇫🇷</span> Frenchy</div>
  <div class="subtitle-text">Mon dictionnaire phonétique</div>
  <div class="search-container">
    <input type="text" id="search" placeholder="Écris comme tu entends…" autocomplete="off" autofocus>
  </div>

  <div id="result"></div>

  <div class="bottom-row" id="others"></div>

  <p class="hint">Essaie : <code>gato</code> → gâteau · <code>xien</code> → chien · <code>garson</code> → garçon · <code>foto</code> → photo</p>

  <script>
    let dictionary = [];
    let activeIndex = -1;

    // --- French phonetic normalization engine ---
    function phonetic(str) {
      let s = str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();

      // Multi-char replacements (order matters — longest first)
      const rules = [
        [/eaux/g, 'o'],
        [/eau/g, 'o'],
        [/aux/g, 'o'],
        [/au/g, 'o'],
        [/ou/g, 'u'],
        [/oi/g, 'wa'],
        [/ain/g, 'in'],
        [/ein/g, 'in'],
        [/aim/g, 'in'],
        [/eim/g, 'in'],
        [/en(?=[^aeiou]|$)/g, 'an'],
        [/em(?=[bp])/g, 'an'],
        [/an(?=[^aeiou]|$)/g, 'an'],
        [/am(?=[bp])/g, 'an'],
        [/on(?=[^aeiou]|$)/g, 'on'],
        [/om(?=[bp])/g, 'on'],
        [/un(?=[^aeiou]|$)/g, 'in'],
        [/ph/g, 'f'],
        [/qu/g, 'k'],
        [/gu(?=[ei])/g, 'g'],
        [/ch/g, 'sh'],
        [/gn/g, 'ny'],
        [/tion/g, 'sion'],
        [/th/g, 't'],
        [/rh/g, 'r'],
        [/ll/g, 'l'],
        [/ss/g, 's'],
        [/tt/g, 't'],
        [/mm/g, 'm'],
        [/nn/g, 'n'],
        [/pp/g, 'p'],
        [/ff/g, 'f'],
        [/cc/g, 'k'],
        [/rr/g, 'r'],
        [/ee/g, 'e'],
        [/oo/g, 'o'],
        [/aa/g, 'a'],
        [/ii/g, 'i'],
        // c before e/i = s
        [/c(?=[ei])/g, 's'],
        // c elsewhere = k
        [/c/g, 'k'],
        // g before e/i = j
        [/g(?=[ei])/g, 'j'],
        // Silent trailing consonants (common in French)
        [/([aeiou])[stdxzp]$/g, '$1'],
        [/e$/g, ''],
        // y as vowel
        [/y/g, 'i'],
        // w
        [/w/g, 'v'],
        // x as sh (kids often write x for the ch sound) — must be before h removal
        [/x/g, 'sh'],
        // silent h
        [/h/g, ''],
      ];

      for (const [re, rep] of rules) {
        s = s.replace(re, rep);
      }

      return s;
    }

    function searchWords(query) {
      if (!query) return [];
      const pq = phonetic(query);
      const lq = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

      const scored = [];
      for (const entry of dictionary) {
        let score = 0;

        // Exact prefix on the word
        const lw = entry.word.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        if (lw.startsWith(lq)) {
          score = 100;
        }

        // Phonetic prefix match
        if (entry._phonetic.startsWith(pq)) {
          score = Math.max(score, 80);
        }

        // Phonetic contains
        if (score === 0 && entry._phonetic.includes(pq)) {
          score = 30;
        }

        // Fuzzy phonetic (Levenshtein on short inputs)
        if (score === 0 && pq.length >= 3) {
          const dist = levenshtein(pq, entry._phonetic.slice(0, pq.length + 2));
          if (dist <= Math.max(1, Math.floor(pq.length / 3))) {
            score = 20;
          }
        }

        if (score > 0) {
          // Compute phonetic distance (absolute highest priority tiebreaker)
          const phonDist = levenshtein(pq, entry._phonetic);
          const litDist = levenshtein(lq, lw);
          scored.push({ entry, score, phonDist, litDist });
        }
      }

      // Sort: match tier → phonetic distance → frequency → literal similarity
      scored.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        if (a.phonDist !== b.phonDist) return a.phonDist - b.phonDist;
        const freqDiff = (a.entry.freq || 99999) - (b.entry.freq || 99999);
        if (freqDiff !== 0) return freqDiff;
        return a.litDist - b.litDist;
      });

      // Only keep tight phonetic matches or exact literal prefix matches
      const maxDist = Math.floor(pq.length / 4);
      const filtered = scored.filter(s => s.phonDist <= maxDist || s.score >= 100);
      return filtered.slice(0, 12);
    }

    function levenshtein(a, b) {
      const m = a.length, n = b.length;
      const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + (a[i - 1] !== b[j - 1] ? 1 : 0)
          );
        }
      }
      return dp[m][n];
    }

    function catClass(cat) { return 'cat cat-' + cat; }
    function genderLabel(g) { return g === 'm' ? 'masculin' : g === 'f' ? 'féminin' : ''; }

    // Highlight differences between user input and matched word
    function highlightDiff(word, query) {
      if (!query) return word;
      const w = word.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      const q = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

      // Use Levenshtein backtrack to get char-level alignment
      const m = q.length, n = w.length;
      const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + (q[i - 1] !== w[j - 1] ? 1 : 0)
          );
        }
      }

      // Backtrack to classify each character in word
      const status = new Array(n).fill('same'); // 'same', 'change', 'add'
      let i = m, j = n;
      while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && dp[i][j] === dp[i-1][j-1] + (q[i-1] !== w[j-1] ? 1 : 0)) {
          if (q[i-1] !== w[j-1]) status[j-1] = 'change';
          i--; j--;
        } else if (j > 0 && dp[i][j] === dp[i][j-1] + 1) {
          status[j-1] = 'add';
          j--;
        } else {
          i--;
        }
      }

      // Build highlighted HTML using original (accented) word chars
      let html = '';
      for (let k = 0; k < word.length; k++) {
        const cls = status[k] || 'same';
        html += `<span class="diff-${cls}">${word[k]}</span>`;
      }
      return html;
    }


    function showCard(entry, query) {
      const genderHtml = entry.gender
        ? `<span class="card-gender">${genderLabel(entry.gender)}</span>` : '';
      const phoneticVal = phonetic(entry.word);
      const wordHtml = query ? highlightDiff(entry.word, query) : entry.word;
      document.getElementById('result').innerHTML = `
        <div class="card">
          <div class="card-word">${wordHtml}</div>
          <div class="card-meta">
            <span class="${catClass(entry.category)}">${entry.category}</span>
            ${genderHtml}
            <span class="phonetic-badge">/${phoneticVal}/</span>
          </div>
          <div class="card-definition">${entry.definition}</div>
          <div class="card-example">${entry.example}</div>
        </div>
      `;
    }

    function showResults(scored, query) {
      const resultEl = document.getElementById('result');
      const othersEl = document.getElementById('others');

      if (!scored.length) {
        resultEl.innerHTML = '';
        othersEl.innerHTML = '';
        return;
      }

      // Keep a mutable display order so we can swap
      const display = scored.slice(0, 5);
      renderResults(display, query);
    }

    function renderResults(display, query, swapIdx) {
      const resultEl = document.getElementById('result');
      const othersEl = document.getElementById('others');

      showCard(display[0].entry, query);
      if (swapIdx !== undefined) {
        const card = resultEl.querySelector('.card');
        if (card) card.classList.add('swap-in');
      }

      const runners = display.slice(1);
      if (runners.length) {
        othersEl.innerHTML = runners.map((s, i) => `
          <div class="mini-card" data-idx="${i}">
            <div class="word">${highlightDiff(s.entry.word, query)}</div>
          </div>`).join('');
        // Apply bounce-down animation to the card that was demoted
        if (swapIdx !== undefined) {
          const demotedEl = othersEl.children[swapIdx - 1];
          if (demotedEl) demotedEl.classList.add('swap-in');
        }
        othersEl.querySelectorAll('.mini-card').forEach(el => {
          el.addEventListener('click', () => {
            const idx = +el.dataset.idx + 1;
            // Swap clicked item to primary position
            const clicked = display[idx];
            display[idx] = display[0];
            display[0] = clicked;
            renderResults(display, query, idx);
            fitToScreen();
          });
        });
      } else {
        othersEl.innerHTML = '';
      }
    }

    // --- Auto-fit: progressively shrink if content overflows viewport ---
    function fitToScreen() {
      const body = document.body;
      let scale = 100;
      body.style.fontSize = '';
      while (body.scrollHeight > window.innerHeight && scale > 50) {
        scale -= 2;
        body.style.fontSize = scale + '%';
      }
    }
    window.addEventListener('resize', fitToScreen);

    // --- Event wiring ---
    const searchEl = document.getElementById('search');
    let currentScored = [];

    searchEl.addEventListener('input', () => {
      activeIndex = -1;
      const q = searchEl.value.trim();
      currentScored = searchWords(q);
      showResults(currentScored, q);
      fitToScreen();

      const hint = document.querySelector('.hint');
      if (hint) hint.style.display = q.length > 0 ? 'none' : '';
    });

    searchEl.addEventListener('keydown', (e) => {
      if (!currentScored.length) return;
      const top5 = currentScored.slice(0, 5);
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIndex = Math.min(activeIndex + 1, top5.length - 1);
        showCard(top5[activeIndex].entry, searchEl.value.trim());
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIndex = Math.max(activeIndex - 1, 0);
        showCard(top5[activeIndex].entry, searchEl.value.trim());
      }
    });

    // --- Load dictionary ---
    fetch('src/data/dictionary.json')
      .then(r => r.json())
      .then(data => {
        dictionary = data.map(e => ({ ...e, _phonetic: phonetic(e.word) }));
        searchEl.focus();
      })
      .catch(err => {
        console.error(err);
      });
  </script>
</body>
</html>
