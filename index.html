<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astermots</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&family=Orbitron:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background: #0a0e1a;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 15% 85%, rgba(200,220,255,0.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 85% 15%, rgba(200,220,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 30%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 70%, rgba(255,255,255,0.25) 0%, transparent 100%);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: row;
      color: #e0e8f0;
    }

    /* --- Accepted pairs panel (left) --- */
    .pairs-panel {
      width: clamp(160px, 20vw, 240px);
      height: 100vh;
      padding: 0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      background: rgba(8,12,28,0.9);
      border-right: 2px solid rgba(126,202,255,0.2);
      backdrop-filter: blur(8px);
    }

    /* --- Rewards panel (right) --- */
    .rewards-panel {
      width: clamp(160px, 20vw, 240px);
      height: 100vh;
      padding: 0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      background: rgba(8,12,28,0.9);
      border-left: 2px solid rgba(255,215,0,0.2);
      backdrop-filter: blur(8px);
    }
    .rewards-panel .panel-header {
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255,215,0,0.3);
      border-bottom: 1px solid rgba(255,215,0,0.15);
    }
    .rewards-panel .panel-header::before,
    .rewards-panel .panel-header::after {
      color: #ffd700;
    }
    .rewards-panel .panel-items { justify-content: flex-start; }
    .rewards-panel .panel-empty {
      color: rgba(255,215,0,0.25);
    }
    .reward-card {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15,22,40,0.7);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 10px;
      padding: 0.6rem;
      animation: rewardPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .reward-emoji {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      filter: drop-shadow(0 0 6px rgba(255,215,0,0.4));
    }
    .reward-label {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.45rem, 0.8vw, 0.55rem);
      color: rgba(255,215,0,0.4);
      text-align: center;
      margin-top: 0.2rem;
    }
    .rewards-panel .panel-footer {
      border-top: 1px solid rgba(255,215,0,0.1);
    }
    .rewards-panel .panel-status {
      color: rgba(255,215,0,0.3);
    }
    @keyframes rewardPop {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); opacity: 1; }
    }
    .reward-tier {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.4rem, 0.7vw, 0.5rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 0.15rem;
    }
    .reward-name {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.42rem, 0.75vw, 0.52rem);
      color: rgba(200,220,255,0.8);
      text-align: center;
      margin-top: 0.15rem;
      line-height: 1.2;
    }
    .reward-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-top: 0.25rem;
      gap: 0.3rem;
    }

    /* --- Reward Guide Modal --- */
    .guide-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .guide-modal {
      background: linear-gradient(135deg, rgba(12,18,40,0.98), rgba(20,28,55,0.98));
      border: 2px solid rgba(255,215,0,0.3);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      max-width: 500px;
      width: 90vw;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 0 40px rgba(255,215,0,0.15);
    }
    .guide-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.9rem, 2vw, 1.3rem);
      color: #ffd700;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 12px rgba(255,215,0,0.3);
    }
    .guide-subtitle {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(0.6rem, 1.2vw, 0.8rem);
      color: rgba(255,255,255,0.5);
      text-align: center;
      margin-bottom: 1rem;
    }
    .guide-tiers { display: flex; flex-direction: column; gap: 0.5rem; }
    .guide-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.7rem;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .guide-tier {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.55rem, 1vw, 0.7rem);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      min-width: 80px;
    }
    .guide-cards {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(0.5rem, 0.9vw, 0.65rem);
      color: rgba(255,255,255,0.35);
      min-width: 55px;
    }
    .guide-emojis {
      font-size: clamp(0.8rem, 1.5vw, 1.1rem);
      letter-spacing: 0.15em;
    }
    .guide-close {
      display: block;
      margin: 1rem auto 0;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.55rem, 1vw, 0.7rem);
      color: #ffd700;
      background: transparent;
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 8px;
      padding: 0.5rem 1.5rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: background 0.2s, border-color 0.2s;
    }
    .guide-close:hover {
      background: rgba(255,215,0,0.1);
      border-color: rgba(255,215,0,0.5);
    }
    .guide-link {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.4rem, 0.75vw, 0.5rem);
      color: rgba(255,215,0,0.4);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: color 0.2s;
    }
    .guide-link:hover { color: rgba(255,215,0,0.7); }

    /* --- Item Inspection Modal (spaceship computer UI) --- */
    .inspect-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(6px);
    }
    .inspect-modal {
      background: linear-gradient(145deg, rgba(8,14,32,0.98), rgba(16,24,50,0.98));
      border: 1px solid rgba(126,202,255,0.25);
      border-radius: 4px;
      padding: 0;
      max-width: 420px;
      width: 90vw;
      box-shadow: 0 0 60px rgba(126,202,255,0.1), inset 0 0 30px rgba(0,0,0,0.5);
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
    }
    .inspect-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0.8rem;
      background: rgba(126,202,255,0.05);
      border-bottom: 1px solid rgba(126,202,255,0.15);
    }
    .inspect-sys {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.4rem, 0.7vw, 0.5rem);
      color: rgba(126,202,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
    .inspect-close {
      background: none;
      border: 1px solid rgba(255,100,100,0.3);
      color: rgba(255,100,100,0.6);
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 2px;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      transition: all 0.2s;
    }
    .inspect-close:hover { border-color: #ff6b6b; color: #ff6b6b; }
    .inspect-body {
      padding: 1.2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
    }
    .inspect-emoji-ring {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: inspectSpin 8s linear infinite;
    }
    .inspect-emoji-ring::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 1px dashed rgba(126,202,255,0.2);
      animation: inspectSpin 12s linear infinite reverse;
    }
    .inspect-emoji-ring::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(126,202,255,0.08);
    }
    @keyframes inspectSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .inspect-emoji-inner {
      font-size: 3.5rem;
      filter: drop-shadow(0 0 15px var(--glow));
      animation: none;
    }
    .inspect-item-name {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.7rem, 1.4vw, 1rem);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
    }
    .inspect-tier-badge {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.45rem, 0.8vw, 0.55rem);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 0.2rem 0.8rem;
      border-radius: 2px;
      border: 1px solid;
    }
    .inspect-divider {
      width: 80%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(126,202,255,0.2), transparent);
      margin: 0.2rem 0;
    }
    .inspect-desc {
      font-size: clamp(0.65rem, 1.1vw, 0.8rem);
      color: rgba(200,215,230,0.75);
      line-height: 1.6;
      text-align: center;
      padding: 0 0.5rem;
    }
    .inspect-footer {
      display: flex;
      justify-content: space-between;
      padding: 0.4rem 0.8rem;
      background: rgba(126,202,255,0.03);
      border-top: 1px solid rgba(126,202,255,0.1);
    }
    .inspect-stat {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.35rem, 0.6vw, 0.4rem);
      color: rgba(126,202,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .panel-header {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.6rem, 1.2vw, 0.8rem);
      font-weight: 600;
      color: #7ecaff;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      padding: 1rem 0.8rem 0.6rem;
      border-bottom: 1px solid rgba(126,202,255,0.15);
      text-align: center;
      text-shadow: 0 0 10px rgba(126,202,255,0.3);
    }
    .panel-header::before {
      content: '◆';
      margin-right: 0.4em;
      font-size: 0.6em;
      vertical-align: middle;
    }
    .panel-header::after {
      content: '◆';
      margin-left: 0.4em;
      font-size: 0.6em;
      vertical-align: middle;
    }
    .panel-items {
      flex: 1;
      overflow-y: auto;
      padding: 0.6rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .panel-items::-webkit-scrollbar { width: 4px; }
    .panel-items::-webkit-scrollbar-thumb { background: rgba(126,202,255,0.2); border-radius: 2px; }
    .panel-empty {
      color: rgba(126,202,255,0.25);
      font-size: clamp(0.55rem, 1vw, 0.7rem);
      text-align: center;
      margin-top: 2rem;
      font-style: italic;
    }
    .panel-footer {
      border-top: 1px solid rgba(126,202,255,0.1);
      padding: 0.5rem;
      display: flex;
      justify-content: center;
    }
    .panel-status {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.45rem, 0.8vw, 0.55rem);
      color: rgba(126,202,255,0.3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .pair-card {
      position: relative;
      background: rgba(15,22,40,0.7);
      border: 1px solid rgba(126,202,255,0.2);
      border-radius: 10px;
      padding: 0.5rem 0.6rem;
      animation: pairSlideIn 0.35s cubic-bezier(0.34, 1.4, 0.64, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .pair-card:hover {
      border-color: rgba(126,202,255,0.5);
      box-shadow: 0 0 8px rgba(126,202,255,0.2);
    }
    .pair-card.game-blurred {
      filter: blur(6px) brightness(0.5);
      transition: filter 0.4s ease;
      pointer-events: none;
    }
    .pair-card.game-revealed {
      filter: none;
      transition: filter 0.4s ease;
    }
    @keyframes cardShake {
      0%, 100% { transform: translateX(0); }
      10% { transform: translateX(-4px) rotate(-1deg); }
      20% { transform: translateX(4px) rotate(1deg); }
      30% { transform: translateX(-3px) rotate(-0.5deg); }
      40% { transform: translateX(3px) rotate(0.5deg); }
      50% { transform: translateX(-2px); }
      60% { transform: translateX(2px); }
      70% { transform: translateX(-1px); }
      80% { transform: translateX(1px); }
    }
    .pair-card.card-shake {
      animation: cardShake 0.6s ease;
      box-shadow: 0 0 12px rgba(126,202,255,0.5);
      border-color: rgba(126,202,255,0.7);
    }
    .pair-game-result {
      position: absolute;
      top: 0.2rem;
      left: 0.2rem;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      line-height: 1;
      z-index: 2;
    }
    .pair-trophy {
      position: absolute;
      top: 0.3rem;
      right: 0.3rem;
      font-size: clamp(0.8rem, 1.4vw, 1.1rem);
      filter: drop-shadow(0 0 4px rgba(255,215,0,0.5));
    }
    .pair-exact {
      justify-content: center;
      padding: 0.7rem 0.6rem;
    }
    .pair-word-exact {
      font-size: clamp(1rem, 1.8vw, 1.3rem) !important;
    }
    .pair-input {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.65rem, 1.2vw, 0.85rem);
      color: rgba(255,255,255,0.5);
      word-break: break-all;
      text-align: center;
    }
    .pair-arrow {
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      color: rgba(126,202,255,0.5);
    }
    .pair-word {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.8rem, 1.5vw, 1.05rem);
      font-weight: 600;
      color: #7ecaff;
      text-align: center;
    }
    .pair-remove {
      position: absolute;
      top: 0.25rem;
      left: 0.25rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.2);
      cursor: pointer;
      font-size: 0.6rem;
      transition: color 0.2s;
      line-height: 1;
    }
    .pair-remove:hover { color: #ff6b6b; }

    @keyframes pairSlideIn {
      from { opacity: 0; transform: translateX(-20px) scale(0.9); }
      to { opacity: 1; transform: translateX(0) scale(1); }
    }

    /* --- Main content area --- */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem 1rem;
      overflow: hidden;
      min-width: 0;
    }

    /* --- Title --- */
    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.6rem, 4.5vw, 2.5rem);
      font-weight: 700;
      color: #7ecaff;
      margin-bottom: 0.2rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(126,202,255,0.4), 0 0 40px rgba(126,202,255,0.15);
    }
    .subtitle-text {
      font-size: clamp(0.7rem, 1.8vw, 0.95rem);
      color: rgba(126,202,255,0.5);
      margin-bottom: clamp(0.8rem, 2vh, 1.5rem);
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* --- Search --- */
    .search-container {
      width: 100%;
      max-width: 520px;
      margin-bottom: clamp(2.4rem, 6vh, 4rem);
    }

    #search {
      width: 100%;
      padding: clamp(0.6rem, 1.5vh, 1rem) 1.2rem;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      font-weight: 500;
      border: 2px solid rgba(126,202,255,0.3);
      border-radius: 12px;
      background: rgba(15,22,40,0.8);
      outline: none;
      color: #e0e8f0;
      caret-color: #7ecaff;
      letter-spacing: 0.01em;
      text-align: center;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #search:focus {
      border-color: #7ecaff;
      box-shadow: 0 0 15px rgba(126,202,255,0.2), inset 0 0 10px rgba(126,202,255,0.05);
    }
    #search::placeholder { color: rgba(126,202,255,0.3); font-weight: 400; font-size: clamp(0.9rem, 2.5vw, 1.4rem); vertical-align: middle; }

    /* --- Grammar badges (space colors) --- */
    .cat {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: clamp(0.55rem, 1.2vw, 0.75rem);
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      display: inline-block;
    }
    .cat-noun { color: #0a0e1a; background: #e0e8f0; }
    .cat-verb { color: #fff; background: #e84545; }
    .cat-adjective { color: #fff; background: #4a8ed4; }
    .cat-adverb { color: #0a0e1a; background: #f0a830; }
    .cat-determiner { color: #0a0e1a; background: #88c8e8; }
    .cat-preposition { color: #fff; background: #45b875; }
    .cat-pronoun { color: #fff; background: #a065c8; }
    .cat-conjunction { color: #fff; background: #e078a0; }
    .cat-interjection { color: #0a0e1a; background: #f0d050; }

    /* --- Main result card --- */
    .card {
      width: 100%;
      background: rgba(15,22,40,0.85);
      padding: clamp(1rem, 2vh, 1.5rem) 1.5rem;
      margin-bottom: clamp(2rem, 5vh, 3rem);
      border-radius: 12px;
      border: 2px solid rgba(126,202,255,0.2);
      animation: popIn 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
      backdrop-filter: blur(10px);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.3rem;
    }
    .card-word {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      color: #fff;
    }
    .accept-btn {
      background: rgba(126,202,255,0.15);
      border: 2px solid rgba(126,202,255,0.4);
      border-radius: 50%;
      width: clamp(2rem, 5vw, 2.8rem);
      height: clamp(2rem, 5vw, 2.8rem);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: #7ecaff;
    }
    .accept-btn:hover {
      background: rgba(126,202,255,0.3);
      border-color: #7ecaff;
      box-shadow: 0 0 12px rgba(126,202,255,0.4);
      transform: scale(1.1);
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: clamp(0.3rem, 1vh, 0.6rem);
      flex-wrap: wrap;
    }
    .card-gender {
      color: rgba(126,202,255,0.6);
      font-size: clamp(0.65rem, 1.3vw, 0.85rem);
      font-weight: 700;
    }
    .phonetic-badge {
      color: rgba(126,202,255,0.6);
      font-size: clamp(0.65rem, 1.3vw, 0.85rem);
      font-style: italic;
    }
    .card-definition {
      font-size: clamp(0.9rem, 2.2vw, 1.3rem);

    .card-example {
      font-size: clamp(0.75rem, 1.8vw, 1rem);

    /* --- Secondary results --- */
    .bottom-row {
      width: 100%;

    }
    .mini-card {
      flex: 1;

    .mini-card:nth-child(3) { animation-delay: 0.15s; }
    .mini-card:nth-child(4) { animation-delay: 0.2s; }
    .mini-card:hover {
      border-color: #7ecaff;
      transform: translateY(-2px);
      box-shadow: 0 0 12px rgba(126,202,255,0.15);
    }
    .mini-card .word {
      font-family: 'Orbitron', sans-serif;
      font-weight: 600;
      font-size: clamp(0.85rem, 2vw, 1.3rem);
      color: #c8d4e0;
    }

    /* Diff highlights */
    .diff-same { color: inherit; }
    .diff-change { color: #ff6b6b; text-decoration: underline; text-decoration-thickness: 2px; text-underline-offset: 3px; }
    .diff-add { color: #ff6b6b; text-decoration: underline; text-decoration-thickness: 2px; text-underline-offset: 3px; }

    /* --- Challenge button --- */
    .challenge-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.5rem, 1vw, 0.65rem);
      font-weight: 600;
      color: #ffd700;
      background: rgba(255,215,0,0.1);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 8px;
      padding: 0.5rem 0.6rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s;
      width: 100%;
      text-shadow: 0 0 8px rgba(255,215,0,0.3);
    }
    .challenge-btn:hover {
      background: rgba(255,215,0,0.2);
      border-color: #ffd700;
      box-shadow: 0 0 12px rgba(255,215,0,0.3);
    }
    .challenge-btn:disabled {
      opacity: 0.3;

    /* --- Challenge game mode --- */
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: clamp(1rem, 2.5vh, 2rem);
      animation: popIn 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    .game-prompt {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      color: rgba(126,202,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
    .game-word {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 700;
      color: #7ecaff;
      text-shadow: 0 0 20px rgba(126,202,255,0.4);
    }
    .game-choices {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(0.5rem, 1.5vw, 1rem);
      max-width: 600px;
    }
    .game-choice {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1rem, 3vw, 1.8rem);
      font-weight: 600;
      color: #e0e8f0;
      background: rgba(15,22,40,0.85);
      border: 2px solid rgba(126,202,255,0.25);
      border-radius: 12px;
      padding: clamp(0.6rem, 1.5vh, 1rem) clamp(1.2rem, 3vw, 2rem);
      cursor: pointer;
      transition: all 0.25s;
      backdrop-filter: blur(8px);
    }
    .game-choice:hover {
      border-color: #7ecaff;
      box-shadow: 0 0 15px rgba(126,202,255,0.25);

    .game-choice.correct {
      border-color: #4ade80;

      box-shadow: 0 0 20px rgba(74,222,128,0.3);

    .game-choice.wrong {
      border-color: #ff6b6b;
      background: rgba(255,107,107,0.1);

      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.6rem, 1.2vw, 0.8rem);

    .game-feedback {
      font-family: 'Nunito', sans-serif;

      min-height: 2em;
      text-align: center;
    }
    .game-next {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.6rem, 1.2vw, 0.8rem);
      font-weight: 600;
      color: #7ecaff;
      background: rgba(126,202,255,0.1);
      border: 1px solid rgba(126,202,255,0.3);
      border-radius: 8px;
      padding: 0.5rem 1.5rem;

      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s;
    }
    .game-next:hover {
      background: rgba(126,202,255,0.2);
      box-shadow: 0 0 12px rgba(126,202,255,0.3);
    }
    .game-exit {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.5rem, 0.9vw, 0.6rem);
      color: rgba(255,255,255,0.3);
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .game-exit:hover { color: #ff6b6b; border-color: #ff6b6b; }
    .game-end {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      animation: popIn 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    .game-end-emoji { font-size: clamp(3rem, 8vw, 5rem); }
    .game-end-score {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 700;
      color: #ffd700;
      text-shadow: 0 0 15px rgba(255,215,0,0.4);
    }
    .hint {
      position: fixed;
      bottom: 1.2rem;
      color: rgba(126,202,255,0.35);
      font-size: 0.75rem;
      text-align: center;
      font-weight: 600;
    }
    .hint code {
      background: rgba(126,202,255,0.1);
      padding: 0.15rem 0.45rem;
      font-size: 0.7rem;
      border-radius: 4px;
      color: rgba(126,202,255,0.5);
      font-weight: 700;
      border: 1px solid rgba(126,202,255,0.15);
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes swapUp {
      0% { opacity: 0.7; transform: scale(0.6) translateY(60px); }
      50% { opacity: 1; transform: scale(1.06) translateY(-8px); }
      75% { transform: scale(0.98) translateY(3px); }
      100% { transform: scale(1) translateY(0); }
    }

    @keyframes swapDown {
      0% { opacity: 0.7; transform: scale(1.3) translateY(-50px); }
      50% { opacity: 1; transform: scale(0.92) translateY(6px); }
      75% { transform: scale(1.03) translateY(-2px); }
      100% { transform: scale(1) translateY(0); }
    }

    .card.swap-in {
      animation: swapUp 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .mini-card.swap-in {
      animation: swapDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
  </style>
</head>
<body>
  <div class="pairs-panel">
    <div class="panel-header">Inventaire</div>
    <div class="panel-items" id="pairs-panel">
      <div class="panel-empty">Aucun mot accepté</div>
    </div>
    <div class="panel-footer">
      <div style="width:100%; display:flex; flex-direction:column; align-items:center; gap:0.4rem;">
        <button class="challenge-btn" id="challenge-btn" onclick="startChallenge()" disabled>🚀 Défi Interstellaire</button>
        <span class="panel-status">sys ready</span>
      </div>
    </div>
  </div>
  <div class="main-content">
  <div class="title">Astermots</div>
  <div class="subtitle-text">Dictionnaire phonétique interstellaire d'Orion</div>
  <div class="search-container">
    <input type="text" id="search" placeholder="" autocomplete="off" autofocus>
  </div>

  <div id="result"></div>

  <div class="bottom-row" id="others"></div>

  <p class="hint">Essaie : <code>gato</code> → gâteau · <code>xien</code> → chien · <code>garson</code> → garçon · <code>foto</code> → photo</p>
  </div>
  <div class="rewards-panel">
    <div class="panel-header">Mes Récompenses</div>
    <div class="panel-items" id="rewards-panel">
      <div class="panel-empty">Joue pour gagner !</div>
    </div>
    <div class="panel-footer">
      <div style="width:100%; display:flex; flex-direction:column; align-items:center; gap:0.4rem;">
        <span class="panel-status" id="rewards-status">0 récompense</span>
        <span class="guide-link" onclick="showRewardGuide()">📖 Guide des récompenses</span>
      </div>
    </div>
  </div>

  <script>
    let dictionary = [];
    let activeIndex = -1;
    let acceptedPairs = []; // {input, word}

    // --- French phonetic normalization engine ---
    function phonetic(str) {
      let s = str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();

      // Multi-char replacements (order matters — longest first)
      const rules = [
        [/eaux/g, 'o'],
        [/eau/g, 'o'],
        [/aux/g, 'o'],
        [/au/g, 'o'],
        [/ou/g, 'u'],
        [/oi/g, 'wa'],
        [/ain/g, 'in'],
        [/ein/g, 'in'],
        [/aim/g, 'in'],
        [/eim/g, 'in'],
        [/en(?=[^aeiou]|$)/g, 'an'],
        [/em(?=[bp])/g, 'an'],
        [/an(?=[^aeiou]|$)/g, 'an'],
        [/am(?=[bp])/g, 'an'],
        [/on(?=[^aeiou]|$)/g, 'on'],
        [/om(?=[bp])/g, 'on'],
        [/un(?=[^aeiou]|$)/g, 'in'],
        [/ph/g, 'f'],
        [/qu/g, 'k'],
        [/gu(?=[ei])/g, 'g'],
        [/ch/g, 'sh'],
        [/gn/g, 'ny'],
        [/tion/g, 'sion'],
        [/th/g, 't'],
        [/rh/g, 'r'],
        [/ll/g, 'l'],
        [/ss/g, 's'],
        [/tt/g, 't'],
        [/mm/g, 'm'],
        [/nn/g, 'n'],
        [/pp/g, 'p'],
        [/ff/g, 'f'],
        [/cc/g, 'k'],
        [/rr/g, 'r'],
        [/ee/g, 'e'],
        [/oo/g, 'o'],
        [/aa/g, 'a'],
        [/ii/g, 'i'],
        // c before e/i = s
        [/c(?=[ei])/g, 's'],
        // c elsewhere = k
        [/c/g, 'k'],
        // g before e/i = j
        [/g(?=[ei])/g, 'j'],
        // Silent trailing consonants (common in French)
        [/([aeiou])[stdxzp]$/g, '$1'],
        [/e$/g, ''],
        // y as vowel
        [/y/g, 'i'],
        // w
        [/w/g, 'v'],
        // x as sh (kids often write x for the ch sound) — must be before h removal
        [/x/g, 'sh'],
        // silent h
        [/h/g, ''],
      ];

      for (const [re, rep] of rules) {
        s = s.replace(re, rep);
      }

      return s;
    }

    function searchWords(query) {
      if (!query) return [];
      const pq = phonetic(query);
      const lq = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

      const scored = [];
      for (const entry of dictionary) {
        let score = 0;

        // Exact prefix on the word
        const lw = entry.word.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        if (lw.startsWith(lq)) {
          score = 100;
        }

        // Phonetic prefix match
        if (entry._phonetic.startsWith(pq)) {
          score = Math.max(score, 80);
        }

        // Phonetic contains
        if (score === 0 && entry._phonetic.includes(pq)) {
          score = 30;
        }

        // Fuzzy phonetic (Levenshtein on short inputs)
        if (score === 0 && pq.length >= 3) {
          const dist = levenshtein(pq, entry._phonetic.slice(0, pq.length + 2));
          if (dist <= Math.max(1, Math.floor(pq.length / 3))) {
            score = 20;
          }
        }

        if (score > 0) {
          // Compute phonetic distance (absolute highest priority tiebreaker)
          const phonDist = levenshtein(pq, entry._phonetic);
          const litDist = levenshtein(lq, lw);
          scored.push({ entry, score, phonDist, litDist });
        }
      }

      // Sort: match tier → phonetic distance → frequency → literal similarity
      scored.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        if (a.phonDist !== b.phonDist) return a.phonDist - b.phonDist;
        const freqDiff = (a.entry.freq || 99999) - (b.entry.freq || 99999);
        if (freqDiff !== 0) return freqDiff;
        return a.litDist - b.litDist;
      });

      // Only keep tight phonetic matches or exact literal prefix matches
      const maxDist = Math.floor(pq.length / 4);
      const filtered = scored.filter(s => s.phonDist <= maxDist || s.score >= 100);
      return filtered.slice(0, 12);
    }

    function levenshtein(a, b) {
      const m = a.length, n = b.length;
      const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + (a[i - 1] !== b[j - 1] ? 1 : 0)
          );
        }
      }
      return dp[m][n];
    }

    function catClass(cat) { return 'cat cat-' + cat; }
    function genderLabel(g) { return g === 'm' ? 'masculin' : g === 'f' ? 'féminin' : ''; }

    // Highlight differences between user input and matched word
    function highlightDiff(word, query) {
      if (!query) return word;
      const w = word.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      const q = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

      // Use Levenshtein backtrack to get char-level alignment
      const m = q.length, n = w.length;
      const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + (q[i - 1] !== w[j - 1] ? 1 : 0)
          );
        }
      }

      // Backtrack to classify each character in word
      const status = new Array(n).fill('same'); // 'same', 'change', 'add'
      let i = m, j = n;
      while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && dp[i][j] === dp[i-1][j-1] + (q[i-1] !== w[j-1] ? 1 : 0)) {
          if (q[i-1] !== w[j-1]) status[j-1] = 'change';
          i--; j--;
        } else if (j > 0 && dp[i][j] === dp[i][j-1] + 1) {
          status[j-1] = 'add';
          j--;
        } else {
          i--;
        }
      }

      // Build highlighted HTML using original (accented) word chars
      let html = '';
      for (let k = 0; k < word.length; k++) {
        const cls = status[k] || 'same';
        html += `<span class="diff-${cls}">${word[k]}</span>`;
      }
      return html;
    }


    function showCard(entry, query) {
      const genderHtml = entry.gender
        ? `<span class="card-gender">${genderLabel(entry.gender)}</span>` : '';
      const phoneticVal = phonetic(entry.word);
      const wordHtml = query ? highlightDiff(entry.word, query) : entry.word;
      document.getElementById('result').innerHTML = `
        <div class="card">
          <div class="card-header">
            <div class="card-word">${wordHtml}</div>
            <button class="accept-btn" onclick="acceptWord('${entry.word.replace(/'/g, "\\'")}')" title="Accepter">✓</button>
          </div>
          <div class="card-meta">
            <span class="${catClass(entry.category)}">${entry.category}</span>
            ${genderHtml}
            <span class="phonetic-badge">/${phoneticVal}/</span>
          </div>
          <div class="card-definition">${entry.definition}</div>
          <div class="card-example">${entry.example}</div>
        </div>
      `;
    }

    function showResults(scored, query) {
      const resultEl = document.getElementById('result');
      const othersEl = document.getElementById('others');

      if (!scored.length) {
        resultEl.innerHTML = '';
        othersEl.innerHTML = '';
        return;
      }

      // Keep a mutable display order so we can swap
      const display = scored.slice(0, 5);
      renderResults(display, query);
    }

    function renderResults(display, query, swapIdx) {
      const resultEl = document.getElementById('result');
      const othersEl = document.getElementById('others');

      showCard(display[0].entry, query);
      if (swapIdx !== undefined) {
        const card = resultEl.querySelector('.card');
        if (card) card.classList.add('swap-in');
      }

      const runners = display.slice(1);
      if (runners.length) {
        othersEl.innerHTML = runners.map((s, i) => `
          <div class="mini-card" data-idx="${i}">
            <div class="word">${highlightDiff(s.entry.word, query)}</div>
          </div>`).join('');
        // Apply bounce-down animation to the card that was demoted
        if (swapIdx !== undefined) {
          const demotedEl = othersEl.children[swapIdx - 1];
          if (demotedEl) demotedEl.classList.add('swap-in');
        }
        othersEl.querySelectorAll('.mini-card').forEach(el => {
          el.addEventListener('click', () => {
            const idx = +el.dataset.idx + 1;
            // Swap clicked item to primary position
            const clicked = display[idx];
            display[idx] = display[0];
            display[0] = clicked;
            renderResults(display, query, idx);
            fitToScreen();
          });
        });
      } else {
        othersEl.innerHTML = '';
      }
    }

    // --- Auto-fit: progressively shrink if content overflows viewport ---
    function fitToScreen() {
      const main = document.querySelector('.main-content');
      let scale = 100;
      main.style.fontSize = '';
      while (main.scrollHeight > window.innerHeight && scale > 50) {
        scale -= 2;
        main.style.fontSize = scale + '%';
      }
    }
    window.addEventListener('resize', fitToScreen);

    // --- Sound effects (Web Audio API, no files needed) ---
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playAcceptSound() {
      const now = getAudioCtx().currentTime;
      // Ascending sci-fi chime
      [440, 660, 880].forEach((freq, i) => {
        const osc = getAudioCtx().createOscillator();
        const gain = getAudioCtx().createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now + i * 0.08);
        gain.gain.setValueAtTime(0.15, now + i * 0.08);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.3);
        osc.connect(gain).connect(getAudioCtx().destination);
        osc.start(now + i * 0.08);
        osc.stop(now + i * 0.08 + 0.3);
      });
    }

    function playTrophySound() {
      const now = getAudioCtx().currentTime;
      // Sparkly fanfare for exact match
      [523, 659, 784, 1047].forEach((freq, i) => {
        const osc = getAudioCtx().createOscillator();
        const gain = getAudioCtx().createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, now + i * 0.1);
        gain.gain.setValueAtTime(0.18, now + i * 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.4);
        osc.connect(gain).connect(getAudioCtx().destination);
        osc.start(now + i * 0.1);
        osc.stop(now + i * 0.1 + 0.4);
      });
    }

    // --- Game answer sound effects ---
    function playCorrectSound() {
      const now = getAudioCtx().currentTime;
      // Triumphant ascending major arpeggio
      [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
        const osc = getAudioCtx().createOscillator();
        const g = getAudioCtx().createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0.2, now + i * 0.07);
        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.07 + 0.35);
        osc.connect(g).connect(getAudioCtx().destination);
        osc.start(now + i * 0.07);
        osc.stop(now + i * 0.07 + 0.4);
      });
      // Bright shimmer on top
      const shimmer = getAudioCtx().createOscillator();
      const sg = getAudioCtx().createGain();
      shimmer.type = 'triangle';
      shimmer.frequency.value = 2093;
      sg.gain.setValueAtTime(0.1, now + 0.25);
      sg.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
      shimmer.connect(sg).connect(getAudioCtx().destination);
      shimmer.start(now + 0.25);
      shimmer.stop(now + 0.85);
    }

    function playWrongSound() {
      const now = getAudioCtx().currentTime;
      // Descending minor second — dissonant buzzy feel
      [310, 280].forEach((freq, i) => {
        const osc = getAudioCtx().createOscillator();
        const g = getAudioCtx().createGain();
        osc.type = 'sawtooth';
        const filter = getAudioCtx().createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 800;
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0.15, now + i * 0.15);
        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.4);
        osc.connect(filter).connect(g).connect(getAudioCtx().destination);
        osc.start(now + i * 0.15);
        osc.stop(now + i * 0.15 + 0.45);
      });
    }

    function playGameEndSound(pct) {
      const now = getAudioCtx().currentTime;
      const dest = getAudioCtx().destination;

      if (pct >= 70) {
        // Grand victory celebration — multi-layered joyful fanfare

        // 1) Brass-like ascending fanfare (C major → high C)
        const fanfare = [261.63, 329.63, 392, 523.25, 659.25, 783.99, 1046.5];
        fanfare.forEach((freq, i) => {
          const osc = getAudioCtx().createOscillator();
          const g = getAudioCtx().createGain();
          const f = getAudioCtx().createBiquadFilter();
          osc.type = 'sawtooth';
          f.type = 'lowpass';
          f.frequency.value = 2500 + i * 200;
          osc.frequency.value = freq;
          g.gain.setValueAtTime(0.12, now + i * 0.08);
          g.gain.linearRampToValueAtTime(0.14, now + i * 0.08 + 0.1);
          g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 1.2);
          osc.connect(f).connect(g).connect(dest);
          osc.start(now + i * 0.08);
          osc.stop(now + i * 0.08 + 1.3);
        });

        // 2) Sustained bright major chord (rings out after arpeggio)
        const chordStart = now + fanfare.length * 0.08;
        [523.25, 659.25, 783.99, 1046.5].forEach(freq => {
          const osc = getAudioCtx().createOscillator();
          const g = getAudioCtx().createGain();
          osc.type = 'triangle';
          osc.frequency.value = freq;
          g.gain.setValueAtTime(0, chordStart);
          g.gain.linearRampToValueAtTime(0.1, chordStart + 0.15);
          g.gain.exponentialRampToValueAtTime(0.001, chordStart + 2.0);
          osc.connect(g).connect(dest);
          osc.start(chordStart);
          osc.stop(chordStart + 2.1);
        });

        // 3) Sparkle shower — rapid high twinkles
        for (let i = 0; i < 12; i++) {
          const t = now + 0.3 + i * 0.12;
          const freq = 1800 + Math.random() * 2500;
          const osc = getAudioCtx().createOscillator();
          const g = getAudioCtx().createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          g.gain.setValueAtTime(0.06 + Math.random() * 0.06, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          osc.connect(g).connect(dest);
          osc.start(t);
          osc.stop(t + 0.35);
        }

        // 4) Celebration boom
        const boom = getAudioCtx().createOscillator();
        const bg = getAudioCtx().createGain();
        boom.type = 'sine';
        boom.frequency.setValueAtTime(80, now);
        boom.frequency.exponentialRampToValueAtTime(30, now + 0.4);
        bg.gain.setValueAtTime(0.25, now);
        bg.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        boom.connect(bg).connect(dest);
        boom.start(now);
        boom.stop(now + 0.55);

      } else {
        // Warm encouraging melody — still uplifting, ascending end
        const melody = [261.63, 293.66, 329.63, 392, 523.25];
        melody.forEach((freq, i) => {
          const osc = getAudioCtx().createOscillator();
          const g = getAudioCtx().createGain();
          osc.type = 'triangle';
          osc.frequency.value = freq;
          g.gain.setValueAtTime(0.14, now + i * 0.18);
          g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.18 + 0.6);
          osc.connect(g).connect(dest);
          osc.start(now + i * 0.18);
          osc.stop(now + i * 0.18 + 0.65);
        });
        // Gentle resolved chord at the end
        const cEnd = now + melody.length * 0.18;
        [392, 523.25].forEach(freq => {
          const osc = getAudioCtx().createOscillator();
          const g = getAudioCtx().createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          g.gain.setValueAtTime(0.08, cEnd);
          g.gain.exponentialRampToValueAtTime(0.001, cEnd + 1.0);
          osc.connect(g).connect(dest);
          osc.start(cEnd);
          osc.stop(cEnd + 1.1);
        });
      }
    }

    // --- Game background music (procedural ambient space loop) ---
    let bgMusicNodes = null;

    function startBgMusic() {
      if (bgMusicNodes) return;
      const ctx = getAudioCtx();
      const master = ctx.createGain();
      master.gain.setValueAtTime(0, ctx.currentTime);
      master.gain.linearRampToValueAtTime(0.22, ctx.currentTime + 1.5);
      master.connect(ctx.destination);

      const nodes = [];
      const intervals = [];
      const bpm = 140;
      const eighthMs = (60 / bpm / 2) * 1000;
      let beatPhase = 0;

      // 808 kick — deep sine sweep with long sub tail
      function kick808() {
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(30, now + 0.15);
        g.gain.setValueAtTime(0.6, now);
        g.gain.setValueAtTime(0.55, now + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.connect(g).connect(master);
        osc.start(now);
        osc.stop(now + 0.45);
        // Click transient
        const click = ctx.createOscillator();
        const cg = ctx.createGain();
        click.type = 'triangle';
        click.frequency.setValueAtTime(1000, now);
        click.frequency.exponentialRampToValueAtTime(60, now + 0.02);
        cg.gain.setValueAtTime(0.3, now);
        cg.gain.exponentialRampToValueAtTime(0.001, now + 0.025);
        click.connect(cg).connect(master);
        click.start(now);
        click.stop(now + 0.03);
      }

      // 808 snare — pitched body + noise
      function snare808() {
        const now = ctx.currentTime;
        // Body
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(220, now);
        osc.frequency.exponentialRampToValueAtTime(130, now + 0.06);
        g.gain.setValueAtTime(0.25, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        osc.connect(g).connect(master);
        osc.start(now);
        osc.stop(now + 0.15);
        // Noise
        const bufSize = ctx.sampleRate * 0.15;
        const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const ng = ctx.createGain();
        const hp = ctx.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.value = 2000;
        ng.gain.setValueAtTime(0.2, now);
        ng.gain.exponentialRampToValueAtTime(0.001, now + 0.13);
        src.connect(hp).connect(ng).connect(master);
        src.start(now);
      }

      // Closed hi-hat — short noise
      function hat808(open) {
        const now = ctx.currentTime;
        const dur = open ? 0.12 : 0.04;
        const bufSize = ctx.sampleRate * dur;
        const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const g = ctx.createGain();
        const bp = ctx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 10000;
        bp.Q.value = 1;
        g.gain.setValueAtTime(open ? 0.08 : 0.06, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + dur);
        src.connect(bp).connect(g).connect(master);
        src.start(now);
      }

      // Drum loop
      const drumInterval = setInterval(() => {
        if (!bgMusicNodes) { clearInterval(drumInterval); return; }
        const beat = beatPhase % 8;

        // Kick on 1 and 5 (half notes)
        if (beat === 0 || beat === 4) kick808();
        // Ghost kick on 7 (occasional bounce)
        if (beat === 7 && beatPhase % 16 >= 8) kick808();

        // Snare on 2 and 6 (backbeat)
        if (beat === 2 || beat === 6) snare808();

        // Hi-hats — every eighth note, open on off-beats
        if (beat % 2 === 0) hat808(false);
        if (beat % 2 === 1) hat808(beat === 3 || beat === 7);

        beatPhase++;
      }, eighthMs);
      intervals.push(drumInterval);

      // Subtle synth pad — soft filtered chord, barely there
      const padFreqs = [130.81, 164.81, 196.00]; // C3-E3-G3
      padFreqs.forEach(freq => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        const f = ctx.createBiquadFilter();
        osc.type = 'sine';
        osc.frequency.value = freq;
        f.type = 'lowpass';
        f.frequency.value = 600;
        f.Q.value = 0.5;
        g.gain.value = 0.04;
        osc.connect(f).connect(g).connect(master);
        osc.start();
        nodes.push(osc);
      });

      // Minimal sparkle — rare high sine pings
      const sparkleInterval = setInterval(() => {
        if (!bgMusicNodes) { clearInterval(sparkleInterval); return; }
        if (Math.random() > 0.3) return; // only ~30% of the time
        const now = ctx.currentTime;
        const freq = [523.25, 659.25, 783.99, 1046.5][Math.floor(Math.random() * 4)];
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0.04, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.connect(g).connect(master);
        osc.start(now);
        osc.stop(now + 0.55);
      }, eighthMs * 4);
      intervals.push(sparkleInterval);

      bgMusicNodes = { master, nodes, intervals };
    }

    function stopBgMusic() {
      if (!bgMusicNodes) return;
      const { master, nodes, intervals } = bgMusicNodes;
      intervals.forEach(id => clearInterval(id));
      master.gain.linearRampToValueAtTime(0, getAudioCtx().currentTime + 1.5);
      setTimeout(() => {
        nodes.forEach(n => { try { n.stop(); } catch(e){} });
        master.disconnect();
      }, 1600);
      bgMusicNodes = null;
    }

    function acceptWord(word) {
      const inputText = document.getElementById('search').value.trim();
      if (inputText) {
        const isExact = inputText.toLowerCase() === word.toLowerCase();
        if (isExact) playTrophySound(); else playAcceptSound();
        const wordHtml = highlightDiff(word, inputText);
        acceptedPairs.push({ input: inputText, word: word });
        addPairCard(inputText, wordHtml, isExact);
      }
      document.getElementById('search').value = '';
      document.getElementById('result').innerHTML = '';
      document.getElementById('others').innerHTML = '';
      document.getElementById('search').focus();
      const hint = document.querySelector('.hint');
      if (hint) hint.style.display = '';
      fitToScreen();
    }

    function addPairCard(input, wordHtml, isExact) {
      const panel = document.getElementById('pairs-panel');
      const empty = panel.querySelector('.panel-empty');
      if (empty) empty.remove();
      const card = document.createElement('div');
      card.className = 'pair-card' + (isExact ? ' pair-exact' : '');
      card.dataset.word = acceptedPairs[acceptedPairs.length - 1].word;
      card.dataset.input = input;
      if (isExact) {
        card.innerHTML = `
          <span class="pair-trophy">🏆</span>
          <div class="pair-word pair-word-exact">${input}</div>
          <button class="pair-remove" onclick="event.stopPropagation(); this.parentElement.remove(); updatePairCount();" title="Retirer">✕</button>
        `;
      } else {
        card.innerHTML = `
          <div class="pair-input">${input}</div>
          <div class="pair-arrow">↓</div>
          <div class="pair-word">${wordHtml}</div>
          <button class="pair-remove" onclick="event.stopPropagation(); this.parentElement.remove(); updatePairCount();" title="Retirer">✕</button>
        `;
      }
      card.addEventListener('click', () => showPairDetail(card.dataset.word, card.dataset.input));
      panel.prepend(card);
      updatePairCount();
      fitToScreen();
    }

    function showPairDetail(word, input) {
      if (gameState) return;
      const entry = dictionary.find(e => e.word === word);
      if (!entry) return;
      showCard(entry, input);
      document.getElementById('others').innerHTML = '';
      const search = document.getElementById('search');
      if (search) search.value = input;
      fitToScreen();
    }

    function updatePairCount() {
      const panel = document.getElementById('pairs-panel');
      const count = panel.querySelectorAll('.pair-card').length;
      const status = document.querySelector('.pairs-panel .panel-status');
      if (status) status.textContent = count > 0 ? count + ' mot' + (count > 1 ? 's' : '') : 'sys ready';
      const btn = document.getElementById('challenge-btn');
      if (btn) btn.disabled = count < 2;
      if (count === 0) {
        panel.innerHTML = '<div class="panel-empty">Aucun mot accepté</div>';
        acceptedPairs = [];
      }
      fitToScreen();
    }

    function getTierForCards(cardCount) {
      let tier = rewardTiers[0];
      for (const t of rewardTiers) {
        if (cardCount >= t.min) tier = t;
      }
      return tier;
    }

    function getRandomRewardEmoji(tier) {
      return tier.emojis[Math.floor(Math.random() * tier.emojis.length)];
    }

    function addReward(emoji, tierName, tierColor, label) {
      const panel = document.getElementById('rewards-panel');
      const empty = panel.querySelector('.panel-empty');
      if (empty) empty.remove();

      // Check if this emoji already exists — increment multiplier
      const existing = panel.querySelector(`.reward-card[data-emoji="${CSS.escape(emoji)}"]`);
      if (existing) {
        const mult = parseInt(existing.dataset.count || '1') + 1;
        existing.dataset.count = mult;
        existing.querySelector('.reward-mult').textContent = 'x' + mult;
        existing.querySelector('.reward-mult').style.display = '';
        // Replay pop animation
        existing.style.animation = 'none';
        existing.offsetHeight;
        existing.style.animation = 'rewardPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
        updateRewardCount();
        return;
      }

      const card = document.createElement('div');
      card.className = 'reward-card';
      card.dataset.emoji = emoji;
      card.dataset.count = '1';
      card.dataset.tier = tierName;
      card.dataset.tierColor = tierColor;
      card.style.borderColor = tierColor + '40';
      card.style.cursor = 'pointer';
      const lore = rewardLore[emoji] || { name: 'Objet Inconnu' };
      card.innerHTML = `
        <div style="display:flex; flex-direction:column; align-items:center; width:100%;">
          <div class="reward-emoji">${emoji}</div>
          <span class="reward-mult" style="display:none; font-family:'Orbitron',sans-serif; font-size:clamp(0.5rem,0.9vw,0.65rem); color:${tierColor}; font-weight:700;">x1</span>
          <div class="reward-name" style="color:${tierColor}">${lore.name}</div>
          <div class="reward-bottom">
            <div class="reward-tier" style="color:${tierColor}">${tierName}</div>
            <div class="reward-label">${label}</div>
          </div>
        </div>
      `;
      card.addEventListener('click', () => showRewardInspect(emoji, tierName, tierColor, parseInt(card.dataset.count)));
      panel.prepend(card);
      updateRewardCount();
    }

    function showRewardInspect(emoji, tierName, tierColor, count) {
      const lore = rewardLore[emoji] || { name: 'Objet Inconnu', desc: 'Origine mystérieuse. Aucune donnée dans les archives de la station Astermots.' };
      const overlay = document.createElement('div');
      overlay.className = 'inspect-overlay';
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
      overlay.innerHTML = `
        <div class="inspect-modal">
          <div class="inspect-header">
            <span class="inspect-sys">◈ Station Astermots — Analyse d'objet</span>
            <button class="inspect-close" onclick="this.closest('.inspect-overlay').remove()">ESC</button>
          </div>
          <div class="inspect-body">
            <div class="inspect-emoji-ring" style="background: radial-gradient(circle, ${tierColor}15, transparent 70%); --glow: ${tierColor};">
              <div class="inspect-emoji-inner">${emoji}</div>
            </div>
            <div class="inspect-item-name" style="color:${tierColor}">${lore.name}</div>
            <span class="inspect-tier-badge" style="color:${tierColor}; border-color:${tierColor}40; background:${tierColor}10">${tierName}</span>
            <div class="inspect-divider"></div>
            <div class="inspect-desc">${lore.desc}</div>
          </div>
          <div class="inspect-footer">
            <span class="inspect-stat">Quantité: ${count}</span>

    function updateRewardCount() {
      const panel = document.getElementById('rewards-panel');
      const cards = panel.querySelectorAll('.reward-card');
      let total = 0;
      cards.forEach(c => total += parseInt(c.dataset.count || '1'));
      const status = document.getElementById('rewards-status');
      if (status) status.textContent = total + ' récompense' + (total > 1 ? 's' : '');
    }

    function showRewardGuide() {
      const overlay = document.createElement('div');
      overlay.className = 'guide-overlay';
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
      let rows = '';
      for (let i = rewardTiers.length - 1; i >= 0; i--) {
        const t = rewardTiers[i];
        rows += '<div class="guide-row">' +
          '<span class="guide-tier" style="color:' + t.color + '">' + t.name + '</span>' +
          '<span class="guide-cards">' + t.min + '+ correct</span>' +
          '<span class="guide-emojis">' + t.emojis.join(' ') + '</span>' +
        '</div>';
      }
      overlay.innerHTML = '<div class="guide-modal">' +
        '<div class="guide-title">Guide des Récompenses</div>' +
        '<div class="guide-subtitle">Plus tu as de bonnes réponses, plus la récompense est rare !</div>' +
        '<div class="guide-tiers">' + rows + '</div>' +
        '<button class="guide-close" onclick="this.closest(\'.guide-overlay\').remove()">Fermer</button>' +
      '</div>';
      document.body.appendChild(overlay);

    // --- Challenge Game ---
    let gameState = null;

    function startChallenge() {
      if (acceptedPairs.length < 2) return;
      gameState = {
        pairs: shuffle([...acceptedPairs]),
        current: 0,
        score: 0,
        total: acceptedPairs.length
      };
      // Blur all inventory cards
      document.querySelectorAll('#pairs-panel .pair-card').forEach(c => {
        c.classList.add('game-blurred');
        c.classList.remove('game-revealed', 'card-shake');
      });
      startBgMusic();
      showGameQuestion();
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getDistractors(correctWord, count) {
      // Generate plausible-looking but INVALID French spellings
      // by swapping common orthographic patterns
      const swaps = [
        [/eau/g, 'o'], [/eau/g, 'au'], [/eau/g, 'ot'],
        [/au/g, 'o'], [/au/g, 'eau'], [/au/g, 'ot'],
        [/ph/g, 'f'], [/f/g, 'ph'],
        [/qu/g, 'k'], [/qu/g, 'c'], [/c(?=[aou])/g, 'k'], [/k/g, 'qu'],
        [/ch/g, 'sh'], [/sh/g, 'ch'],
        [/tion/g, 'sion'], [/sion/g, 'tion'],
        [/ai/g, 'è'], [/è/g, 'ai'], [/ei/g, 'ai'],
        [/é/g, 'er'], [/é/g, 'ez'], [/er$/g, 'é'], [/ez$/g, 'é'],
        [/an/g, 'en'], [/en/g, 'an'],
        [/in/g, 'ain'], [/ain/g, 'in'], [/ein/g, 'in'],
        [/on/g, 'om'], [/om/g, 'on'],
        [/ou/g, 'oo'], [/ou/g, 'u'],
        [/oi/g, 'oua'], [/oua/g, 'oi'],
        [/gn/g, 'ni'], [/ni(?=[aeou])/g, 'gn'],
        [/ss/g, 's'], [/s(?=[aeiou])/g, 'ss'],
        [/ll/g, 'l'], [/l(?=[aeioué])/g, 'll'],
        [/tt/g, 't'], [/t(?=[aeioué])/g, 'tt'],
        [/mm/g, 'm'], [/m(?=[aeioué])/g, 'mm'],
        [/nn/g, 'n'], [/n(?=[aeioué])/g, 'nn'],
        [/gu(?=[ei])/g, 'g'], [/g(?=[ei])/g, 'gu'],
        [/ge(?=[ao])/g, 'j'], [/j/g, 'ge'],
        [/x$/g, 's'], [/s$/g, 'x'],
        [/t$/g, ''], [/$/, 't'],  // silent trailing t
        [/s$/g, ''], [/$/, 's'],  // silent trailing s
      ];

      const dictSet = new Set(dictionary.map(e => e.word.toLowerCase()));
      const results = new Set();
      const word = correctWord.toLowerCase();

      // Try each swap pattern
      for (const [pattern, replacement] of swaps) {
        if (results.size >= count * 3) break;
        if (pattern.test(word)) {
          const variant = word.replace(pattern, replacement);
          if (variant !== word && !dictSet.has(variant) && variant.length >= 2) {
            results.add(variant);
          }
        }
      }

      // If not enough, also try the user's original input as a distractor (if invalid)
      // and simple letter swaps
      if (results.size < count) {
        for (let i = 0; i < word.length - 1 && results.size < count * 3; i++) {
          const arr = word.split('');
          [arr[i], arr[i + 1]] = [arr[i + 1], arr[i]];
          const variant = arr.join('');
          if (variant !== word && !dictSet.has(variant)) results.add(variant);
        }
      }

      // Pick random subset, capitalize to match
      const capitalize = s => correctWord[0] === correctWord[0].toUpperCase()
        ? s.charAt(0).toUpperCase() + s.slice(1) : s;
      const arr = shuffle([...results]).slice(0, count);
      return arr.map(capitalize);
    }

    function showGameQuestion() {
      const main = document.querySelector('.main-content');
      const gs = gameState;

      if (gs.current >= gs.total) {
        showGameEnd();
        return;
      }

      const pair = gs.pairs[gs.current];
      const inputIsCorrect = pair.input.toLowerCase() === pair.word.toLowerCase();
      const numGenerated = inputIsCorrect ? 3 : 2;
      const distractors = getDistractors(pair.word, numGenerated);
      if (!inputIsCorrect) {
        distractors.unshift(pair.input);
      }
      const choices = shuffle([pair.word, ...distractors.slice(0, 3)]);

      main.innerHTML = `
        <div class="game-container">
          <div class="game-score">Question ${gs.current + 1} / ${gs.total} · Score: ${gs.score}</div>
          <div class="game-prompt">Quel mot avais-tu choisi ?</div>
          <div class="game-choices">
            ${choices.map(c => `<button class="game-choice" onclick="checkAnswer(this, '${c.replace(/'/g, "\\'")}', '${pair.word.replace(/'/g, "\\'")}')">${c}</button>`).join('')}
          </div>
          <div class="game-feedback" id="game-feedback"></div>
          <button class="game-exit" onclick="exitChallenge()">✕ Quitter</button>
        </div>
      `;
      fitToScreen();
    }

    function checkAnswer(btn, chosen, correct) {
      const buttons = btn.parentElement.querySelectorAll('.game-choice');
      buttons.forEach(b => {
        b.disabled = true;
        if (b.textContent === correct) b.classList.add('correct');
        else if (b === btn && chosen !== correct) b.classList.add('wrong');
      });

      const feedback = document.getElementById('game-feedback');
      if (chosen === correct) {
        gameState.score++;
        playCorrectSound();
        feedback.innerHTML = '<span style="color:#4ade80">✨ Bravo !</span>';
      } else {
        playWrongSound();
        feedback.innerHTML = `<span style="color:#ff6b6b">C'est <strong>${correct}</strong></span>`;
      }

      // Unblur and shake the corresponding inventory card after answer
      const isCorrect = chosen === correct;
      const pairCard = document.querySelector(`#pairs-panel .pair-card[data-word="${CSS.escape(correct)}"]`);
      if (pairCard) {
        pairCard.classList.remove('game-blurred');
        pairCard.classList.add('game-revealed');
        pairCard.classList.remove('card-shake');
        pairCard.offsetHeight;
        pairCard.classList.add('card-shake');
        pairCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        // Add result icon
        let badge = pairCard.querySelector('.pair-game-result');
        if (!badge) {
          badge = document.createElement('span');
          badge.className = 'pair-game-result';
          pairCard.appendChild(badge);
        }
        badge.textContent = isCorrect ? '✅' : '❌';
      }

      setTimeout(() => {
        gameState.current++;
        showGameQuestion();
      }, 1500);
    }

    function showGameEnd() {
      stopBgMusic();
      const main = document.querySelector('.main-content');
      const gs = gameState;
      const pct = Math.round((gs.score / gs.total) * 100);
      playGameEndSound(pct);

      // Award tier based on number of correct answers
      const hasReward = gs.score >= 2;
      const tier = hasReward ? getTierForCards(gs.score) : null;
      const reward = hasReward ? getRandomRewardEmoji(tier) : null;
      if (hasReward) addReward(reward, tier.name, tier.color, gs.score + ' bonnes réponses');

      const rewardHtml = hasReward ? `
          <div style="font-size:clamp(2rem,5vw,3.5rem); margin:0.3rem 0; animation: rewardPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;">${reward}</div>
          <div style="font-family:'Orbitron',sans-serif; font-size:clamp(0.6rem,1.2vw,0.85rem); color:${tier.color}; letter-spacing:0.1em; text-transform:uppercase; margin:0.2rem 0;">${tier.name}</div>
      ` : '';
      const rewardPhrase = hasReward
        ? `${gs.score} bonne${gs.score > 1 ? 's' : ''} réponse${gs.score > 1 ? 's' : ''} → récompense <span style="color:${tier.color}; font-weight:600;">${tier.name}</span> !`
        : 'Il faut au moins 2 bonnes réponses pour une récompense !';

      main.innerHTML = `
        <div class="game-end">
          ${rewardHtml}
          <div class="game-end-score">${gs.score} / ${gs.total}</div>
          <div class="game-prompt">${pct === 100 ? 'Parfait !' : pct >= 70 ? 'Très bien !' : pct >= 40 ? 'Bon effort !' : 'Continue !'}</div>
          <div style="font-family:'Nunito',sans-serif; font-size:clamp(0.6rem,1.2vw,0.85rem); color:rgba(255,255,255,0.5); margin:0.5rem 0;">
            ${rewardPhrase}
          </div>
          <div style="display:flex; gap:0.8rem; margin-top:1rem;">
            <button class="game-next" onclick="startChallenge()">🔄 Rejouer</button>
            <button class="game-next" onclick="exitChallenge()">← Retour</button>
          </div>
        </div>
      `;
      fitToScreen();
    }

    function exitChallenge() {
      gameState = null;
      stopBgMusic();
      // Unblur all inventory cards and remove result badges
      document.querySelectorAll('#pairs-panel .pair-card').forEach(c => {
        c.classList.remove('game-blurred', 'game-revealed', 'card-shake');
        const badge = c.querySelector('.pair-game-result');
        if (badge) badge.remove();
      });
      const main = document.querySelector('.main-content');
      main.innerHTML = `
        <div class="title">Astermots</div>
        <div class="subtitle-text">Dictionnaire phonétique interstellaire d'Orion</div>
        <div class="search-container">
          <input type="text" id="search" placeholder="" autocomplete="off" autofocus>
        </div>
        <div id="result"></div>
        <div class="bottom-row" id="others"></div>
        <p class="hint">Essaie : <code>gato</code> → gâteau · <code>xien</code> → chien · <code>garson</code> → garçon · <code>foto</code> → photo</p>
      `;
      // Re-wire search events
      wireSearchEvents();
      fitToScreen();
    }

    // --- Event wiring ---
    let currentScored = [];

    function wireSearchEvents() {
      const searchEl = document.getElementById('search');
      searchEl.addEventListener('input', () => {
        activeIndex = -1;
        const q = searchEl.value.trim();
        currentScored = searchWords(q);
        showResults(currentScored, q);
        fitToScreen();

        const hint = document.querySelector('.hint');
        if (hint) hint.style.display = q.length > 0 ? 'none' : '';
      });

      searchEl.addEventListener('keydown', (e) => {
        if (!currentScored.length) return;
        const top5 = currentScored.slice(0, 5);
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          activeIndex = Math.min(activeIndex + 1, top5.length - 1);
          showCard(top5[activeIndex].entry, searchEl.value.trim());
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          activeIndex = Math.max(activeIndex - 1, 0);
          showCard(top5[activeIndex].entry, searchEl.value.trim());
        }
      });
    }

    wireSearchEvents();

    // --- Load dictionary ---
    function loadDictionary(data) {
      dictionary = data.map(e => ({ ...e, _phonetic: phonetic(e.word) }));
      document.getElementById('search').focus();
      // DEV: add 5 random words to inventory for testing
      const shuffled = [...dictionary].sort(() => Math.random() - 0.5);
      for (let i = 0; i < Math.min(5, shuffled.length); i++) {
        acceptWord(shuffled[i].word);
      }
    }

    if (typeof DICT_DATA !== 'undefined') {
      loadDictionary(DICT_DATA);
    } else {
      fetch('src/data/dictionary.json')
        .then(r => r.json())
        .then(data => loadDictionary(data))
        .catch(err => {
          console.error('Failed to load dictionary:', err);
          // Try loading via script tag as fallback for file:// protocol
          const s = document.createElement('script');
          s.textContent = 'var DICT_DATA = ' + '[]';
          document.head.appendChild(s);
        });
    }
  </script>
  <script>
    // Load dictionary data via script tag (works with file:// protocol)
    var _dictScript = document.createElement('script');
    _dictScript.onload = function() {
      if (typeof DICT_DATA !== 'undefined' && !dictionary.length) {
        dictionary = DICT_DATA.map(function(e) { return Object.assign({}, e, { _phonetic: phonetic(e.word) }); });
        document.getElementById('search').focus();
      }
    };
    _dictScript.src = 'src/data/dictionary.js';
    document.head.appendChild(_dictScript);
  </script>
</body>
