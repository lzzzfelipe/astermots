<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frenchy 🇫🇷</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f4f0eb;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem 1rem;
      color: #2c2420;
    }

    /* --- Search --- */
    .search-container {
      width: 100%;
      max-width: 480px;
      margin-bottom: 2rem;
    }

    #search {
      width: 100%;
      padding: 0.8rem 0;
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 2.2rem;
      font-weight: 400;
      border: none;
      border-bottom: 2px solid #2c2420;
      background: transparent;
      outline: none;
      color: #2c2420;
      letter-spacing: 0.01em;
    }
    #search:focus { border-bottom-color: #8b5e3c; }
    #search::placeholder { color: #c4b5a5; font-weight: 400; }

    /* --- Montessori grammar colors (earthy tones) --- */
    .cat {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.6rem;
      padding: 0.2rem 0.5rem;
      border-radius: 2px;
    }
    .cat-noun { color: #f4f0eb; background: #2c2420; }
    .cat-verb { color: #fff; background: #b5382a; }
    .cat-adjective { color: #fff; background: #2a5a8b; }
    .cat-adverb { color: #fff; background: #c47b2b; }
    .cat-determiner { color: #2c2420; background: #a8c4d8; }
    .cat-preposition { color: #fff; background: #4a7c59; }
    .cat-pronoun { color: #fff; background: #7b4a8b; }
    .cat-conjunction { color: #fff; background: #c47882; }
    .cat-interjection { color: #2c2420; background: #d4b85a; }

    /* --- Main result card --- */
    .card {
      width: 100%;
      max-width: 480px;
      background: #fff;
      padding: 1.5rem 1.75rem;
      margin-bottom: 0.75rem;
      border-left: 4px solid #8b5e3c;
      box-shadow: 0 1px 3px rgba(44,36,32,0.06);
      animation: fadeIn 0.25s ease-out;
    }
    .card-word {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 2rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
      color: #2c2420;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
    }
    .card-gender { color: #9a8b7a; font-size: 0.7rem; font-weight: 500; }
    .phonetic-badge { color: #9a8b7a; font-size: 0.7rem; font-style: italic; }
    .card-definition {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #4a3f38;
      margin-bottom: 0.4rem;
    }
    .card-example {
      font-size: 0.8rem;
      color: #9a8b7a;
      font-style: italic;
      padding-left: 0.75rem;
      border-left: 2px solid #e0d6cb;
    }

    /* --- Secondary results --- */
    .bottom-row {
      width: 100%;
      max-width: 480px;
      display: flex;
      gap: 0.5rem;
    }
    .mini-card {
      flex: 1;
      padding: 0.6rem 0.5rem;
      background: #fff;
      border-left: 3px solid #d4c9bc;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s, background 0.15s;
      animation: fadeIn 0.2s ease-out both;
      box-shadow: 0 1px 2px rgba(44,36,32,0.04);
    }
    .mini-card:nth-child(1) { animation-delay: 0.05s; }
    .mini-card:nth-child(2) { animation-delay: 0.1s; }
    .mini-card:nth-child(3) { animation-delay: 0.15s; }
    .mini-card:nth-child(4) { animation-delay: 0.2s; }
    .mini-card:hover { background: #faf7f4; border-left-color: #8b5e3c; }
    .mini-card .word {
      font-family: 'DM Serif Display', Georgia, serif;
      font-weight: 400;
      font-size: 0.95rem;
      color: #2c2420;
    }

    /* Diff highlights */
    .diff-same { color: inherit; }
    .diff-change { color: #b5382a; }
    .diff-add { color: #2a5a8b; }

    /* --- Hint --- */
    .hint {
      position: fixed;
      bottom: 1.5rem;
      color: #b8a898;
      font-size: 0.75rem;
      text-align: center;
      letter-spacing: 0.02em;
    }
    .hint code {
      background: #ebe4db;
      padding: 0.15rem 0.4rem;
      font-size: 0.7rem;
      border-radius: 2px;
      color: #6b5d52;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="search-container">
    <input type="text" id="search" placeholder="Écris un mot…" autocomplete="off" autofocus>
  </div>

  <div id="result"></div>

  <div class="bottom-row" id="others"></div>

  <p class="hint">Essaie : <code>gato</code> → gâteau · <code>xien</code> → chien · <code>garson</code> → garçon · <code>foto</code> → photo</p>

  <script>
    let dictionary = [];
    let activeIndex = -1;

    // --- French phonetic normalization engine ---
    function phonetic(str) {
      let s = str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();

      // Multi-char replacements (order matters — longest first)
      const rules = [
        [/eaux/g, 'o'],
        [/eau/g, 'o'],
        [/aux/g, 'o'],
        [/au/g, 'o'],
        [/ou/g, 'u'],
        [/oi/g, 'wa'],
        [/ain/g, 'in'],
        [/ein/g, 'in'],
        [/aim/g, 'in'],
        [/eim/g, 'in'],
        [/en(?=[^aeiou]|$)/g, 'an'],
        [/em(?=[bp])/g, 'an'],
        [/an(?=[^aeiou]|$)/g, 'an'],
        [/am(?=[bp])/g, 'an'],
        [/on(?=[^aeiou]|$)/g, 'on'],
        [/om(?=[bp])/g, 'on'],
        [/un(?=[^aeiou]|$)/g, 'in'],
        [/ph/g, 'f'],
        [/qu/g, 'k'],
        [/gu(?=[ei])/g, 'g'],
        [/ch/g, 'sh'],
        [/gn/g, 'ny'],
        [/tion/g, 'sion'],
        [/th/g, 't'],
        [/rh/g, 'r'],
        [/ll/g, 'l'],
        [/ss/g, 's'],
        [/tt/g, 't'],
        [/mm/g, 'm'],
        [/nn/g, 'n'],
        [/pp/g, 'p'],
        [/ff/g, 'f'],
        [/cc/g, 'k'],
        [/rr/g, 'r'],
        [/ee/g, 'e'],
        [/oo/g, 'o'],
        [/aa/g, 'a'],
        [/ii/g, 'i'],
        // c before e/i = s
        [/c(?=[ei])/g, 's'],
        // c elsewhere = k
        [/c/g, 'k'],
        // g before e/i = j
        [/g(?=[ei])/g, 'j'],
        // Silent trailing consonants (common in French)
        [/([aeiou])[stdxzp]$/g, '$1'],
        [/e$/g, ''],
        // y as vowel
        [/y/g, 'i'],
        // w
        [/w/g, 'v'],
        // x as sh (kids often write x for the ch sound) — must be before h removal
        [/x/g, 'sh'],
        // silent h
        [/h/g, ''],
      ];

      for (const [re, rep] of rules) {
        s = s.replace(re, rep);
      }

      return s;
    }

    function searchWords(query) {
      if (!query) return [];
      const pq = phonetic(query);
      const lq = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

      const scored = [];
      for (const entry of dictionary) {
        let score = 0;

        // Exact prefix on the word
        const lw = entry.word.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        if (lw.startsWith(lq)) {
          score = 100;
        }

        // Phonetic prefix match
        if (entry._phonetic.startsWith(pq)) {
          score = Math.max(score, 80);
        }

        // Phonetic contains
        if (score === 0 && entry._phonetic.includes(pq)) {
          score = 30;
        }

        // Fuzzy phonetic (Levenshtein on short inputs)
        if (score === 0 && pq.length >= 3) {
          const dist = levenshtein(pq, entry._phonetic.slice(0, pq.length + 2));
          if (dist <= Math.max(1, Math.floor(pq.length / 3))) {
            score = 20;
          }
        }

        if (score > 0) {
          // Compute phonetic distance (absolute highest priority tiebreaker)
          const phonDist = levenshtein(pq, entry._phonetic);
          const litDist = levenshtein(lq, lw);
          scored.push({ entry, score, phonDist, litDist });
        }
      }

      // Sort: match tier → phonetic distance → frequency → literal similarity
      scored.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        if (a.phonDist !== b.phonDist) return a.phonDist - b.phonDist;
        const freqDiff = (a.entry.freq || 99999) - (b.entry.freq || 99999);
        if (freqDiff !== 0) return freqDiff;
        return a.litDist - b.litDist;
      });

      // Only keep tight phonetic matches or exact literal prefix matches
      const maxDist = Math.floor(pq.length / 4);
      const filtered = scored.filter(s => s.phonDist <= maxDist || s.score >= 100);
      return filtered.slice(0, 12);
    }

    function levenshtein(a, b) {
      const m = a.length, n = b.length;
      const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + (a[i - 1] !== b[j - 1] ? 1 : 0)
          );
        }
      }
      return dp[m][n];
    }

    function catClass(cat) { return 'cat cat-' + cat; }
    function genderLabel(g) { return g === 'm' ? 'masculin' : g === 'f' ? 'féminin' : ''; }

    // Highlight differences between user input and matched word
    function highlightDiff(word, query) {
      if (!query) return word;
      const w = word.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      const q = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

      // Use Levenshtein backtrack to get char-level alignment
      const m = q.length, n = w.length;
      const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + (q[i - 1] !== w[j - 1] ? 1 : 0)
          );
        }
      }

      // Backtrack to classify each character in word
      const status = new Array(n).fill('same'); // 'same', 'change', 'add'
      let i = m, j = n;
      while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && dp[i][j] === dp[i-1][j-1] + (q[i-1] !== w[j-1] ? 1 : 0)) {
          if (q[i-1] !== w[j-1]) status[j-1] = 'change';
          i--; j--;
        } else if (j > 0 && dp[i][j] === dp[i][j-1] + 1) {
          status[j-1] = 'add';
          j--;
        } else {
          i--;
        }
      }

      // Build highlighted HTML using original (accented) word chars
      let html = '';
      for (let k = 0; k < word.length; k++) {
        const cls = status[k] || 'same';
        html += `<span class="diff-${cls}">${word[k]}</span>`;
      }
      return html;
    }


    function showCard(entry, query) {
      const genderHtml = entry.gender
        ? `<span class="card-gender">${genderLabel(entry.gender)}</span>` : '';
      const phoneticVal = phonetic(entry.word);
      const wordHtml = query ? highlightDiff(entry.word, query) : entry.word;
      document.getElementById('result').innerHTML = `
        <div class="card">
          <div class="card-word">${wordHtml}</div>
          <div class="card-meta">
            <span class="${catClass(entry.category)}">${entry.category}</span>
            ${genderHtml}
            <span class="phonetic-badge">/${phoneticVal}/</span>
          </div>
          <div class="card-definition">${entry.definition}</div>
          <div class="card-example">${entry.example}</div>
        </div>
      `;
    }

    function showResults(scored, query) {
      const resultEl = document.getElementById('result');
      const othersEl = document.getElementById('others');

      if (!scored.length) {
        resultEl.innerHTML = '';
        othersEl.innerHTML = '';
        return;
      }

      showCard(scored[0].entry, query);

      const runners = scored.slice(1, 5);
      if (runners.length) {
        othersEl.innerHTML = runners.map((s, i) => `
          <div class="mini-card" data-idx="${i}">
            <div class="word">${highlightDiff(s.entry.word, query)}</div>
          </div>`).join('');
        othersEl.querySelectorAll('.mini-card').forEach(el => {
          el.addEventListener('click', () => {
            const entry = runners[+el.dataset.idx].entry;
            showCard(entry, query);
          });
        });
      } else {
        othersEl.innerHTML = '';
      }
    }

    // --- Event wiring ---
    const searchEl = document.getElementById('search');
    let currentScored = [];

    searchEl.addEventListener('input', () => {
      activeIndex = -1;
      const q = searchEl.value.trim();
      currentScored = searchWords(q);
      showResults(currentScored, q);

      const hint = document.querySelector('.hint');
      if (hint) hint.style.display = q.length > 0 ? 'none' : '';
    });

    searchEl.addEventListener('keydown', (e) => {
      if (!currentScored.length) return;
      const top5 = currentScored.slice(0, 5);
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIndex = Math.min(activeIndex + 1, top5.length - 1);
        showCard(top5[activeIndex].entry, searchEl.value.trim());
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIndex = Math.max(activeIndex - 1, 0);
        showCard(top5[activeIndex].entry, searchEl.value.trim());
      }
    });

    // --- Load dictionary ---
    fetch('src/data/dictionary.json')
      .then(r => r.json())
      .then(data => {
        dictionary = data.map(e => ({ ...e, _phonetic: phonetic(e.word) }));
        searchEl.focus();
      })
      .catch(err => {
        console.error(err);
      });
  </script>
</body>
</html>
